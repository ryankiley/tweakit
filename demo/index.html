<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Tweakability</title>
  <link rel="stylesheet" href="./tweaks.css" />
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; box-sizing: border-box;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;
      padding: 56px 16px; background: #161616; color: #ededed;
      font-family: "Google Sans Flex", system-ui, -apple-system, sans-serif;
    }
    .intro { text-align: center; max-width: 44ch; }
    h1 { margin: 0 0 8px; font-size: 2rem; font-weight: 600; letter-spacing: -0.02em; }
    p { margin: 0; color: #9a9a9a; line-height: 1.5; }
    #mount { width: 300px; }
  </style>
</head>
<body>
  <div class="intro">
    <h1>Tweakability</h1>
    <p>A dependency-free, code-split parameter panel. Hand it a plain schema and it builds a live control for every value.</p>
  </div>
  <div id="mount"></div>
  <script type="module">
    // The code-split entry: it dynamic-imports the heavy controls (colour, gradient,
    // spring, fps…) on first use, so basic panels stay lean.
    import { tweaks } from "./tweaks/core.js";
    const t = tweaks("Demo", {
      blur: [24, 0, 100, 1],
      scale: [1.2, 0, 3, 0.1],
      label: "Hello",
      visible: true,
      blend: ["normal", "multiply", "screen", "overlay"],
      accent: "#7C5CFF",
      ramp: { type: "gradient", value: { stops: [
        { color: "oklch(0.72 0.19 25)", pos: 0 },
        { color: "oklch(0.86 0.17 95)", pos: 0.5 },
        { color: "oklch(0.72 0.16 280)", pos: 1 },
      ] } },
      motion: { type: "spring", stiffness: 220, damping: 18, mass: 1 },
      fps: { type: "fpsgraph", label: "FPS" },
    });
    document.getElementById("mount").appendChild(t.el);
  </script>
</body>
</html>
