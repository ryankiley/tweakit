# Publish to npm with provenance when a v* tag is pushed.
#
# One-time setup: add an NPM_TOKEN repo secret (Settings → Secrets and variables
# → Actions) — an npm Automation token for the first publish, or a Granular
# Access token scoped to the `tweakit` package once it exists.
#
# Release flow: bump the version in package.json + package-lock.json, commit, then
# publish a GitHub Release for vX.Y.Z (its notes are the changelog). Publishing the
# Release creates the matching tag, which triggers this workflow. The tag must match the
# package.json version or the run fails before publishing. (A bare `git tag vX.Y.Z &&
# git push origin vX.Y.Z` still works if you don't want a GitHub Release.)
name: release

on:
  push:
    tags:
      - "v*"

# Least privilege: read the tree, plus the OIDC token npm uses to sign provenance.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org" # wires NODE_AUTH_TOKEN into .npmrc
      - run: npm ci
      # A stray tag can't publish a mismatched release: the tag (minus its `v`)
      # must equal package.json's version.
      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag '$TAG' does not match package.json version '$PKG'"
            exit 1
          fi
      # Skip when this version is already on the registry — so a retroactive tag (or a
      # re-tag) for an already-published release no-ops cleanly instead of failing on a
      # duplicate publish. The check uses `npm view` (public, needs no auth).
      - name: Skip if already published
        id: check
        run: |
          if npm view "tweakit@${GITHUB_REF_NAME#v}" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::tweakit@${GITHUB_REF_NAME#v} is already published — skipping publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      # `prepublishOnly` (package.json) rebuilds dist + runs the tests before the tarball
      # is created — a red build can never reach the registry.
      - if: steps.check.outputs.skip == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
